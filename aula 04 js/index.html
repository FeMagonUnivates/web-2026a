<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Contador</title>
</head>

<body>
    <button onclick="diminuir()">-</button>

    <span id="numero">0</span>

    <button onclick="aumentar()">+</button>

    <script>
        let num = 0;

        function aumentar() {
            num++;
            document.getElementById("numero").textContent = num;
        }

        function diminuir() {
            num--;
            document.getElementById("numero").textContent = num;
        }
    </script>
</body>

</html>
