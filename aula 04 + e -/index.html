<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Contador</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <button onclick="diminuir(), mudarCor()" class="botao">-</button>
        <span id="numero" class="num">0</span>
        <button onclick="aumentar()" class="botao">+</button>
    </div>

    <script>
        let num1 = 0;

        function aumentar() {
            num1++;
            document.getElementById("numero").textContent = num1;
        }

        function diminuir() {
            num1--;
            document.getElementById("numero").textContent = num1;
        }

        function mudarCor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);

            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }
    </script>
</body>

</html>
