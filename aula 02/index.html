<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>atividade 01</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Fernando Magon</h1>
        <h2>Header</h2>
    </header>

    <main>
        <section class="secao1">
            <h2 class="titulo-secao">Section 1</h2>
            <br>
            <img src="imagens/batata.jfif" alt="Foto de batatas" class="imagem-batata">
            <div class="listas">
                <ol>
                    <li>um</li>
                    <li>dois</li>
                    <li>três</li>
                </ol>
                <ul>
                    <li>Batata</li>
                    <li>Maçã</li>
                    <li>Gelatina sem sabor</li>
                </ul>
            </div>
            <div class="videos">
                <video controls src="videos/10sec.mp4"></video>
                <iframe src="https://www.youtube.com/embed/lY5V4hSLWY8?si=ZfWC4jQw8KRfUphR"
                    title="Música nova do Bruno Mars" frameborder="0" >
                </iframe>
            </div>
        </section>
        <section>
            <h2 class="titulo-secao">Section 2</h2>
            <a href="https://google.com" target="_blank">
                <img src="imagens/google.png" alt="imagem do Google">
            </a>
            <p>Clica no Google</p>
            <form>
                <label>Nome:</label>
                <input type="text" placeholder="Nome">
                <br>
                <label>Email:</label>
                <input type="email" placeholder="Email">
                <br>
                <button type="submit">Enviar</button>
            </form>
            <br>
            <table border="1">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Preço</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Notebook</td>
                        <td>R$ 3.000</td>
                    </tr>
                    <tr>
                        <td>Mouse</td>
                        <td>R$ 80</td>
                    </tr>
                </tbody>
            </table>
            <hr>
        </section>
    </main>

    <footer>
        <h2>Footer</h2>
        <p>© Fernando Magon</p>
    </footer>

</body>

</html>
