<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fe Magon</title>
</head>

<body>
    <h1>Site 01</h1>

    <h2>Título 02</h2>

    <h3>Título 03...</h3>

    <!-- parágrafo -->
    <p>Isso é um parágrafo.</p>

    <!-- quebra de linha -->
    <br>

    <!-- linha horizontal -->
    <hr>

    <!--Negrito-->
    <strong>Texto em negrito</strong>
    <br>

    <!-- Itálico -->
    <em>Texto em itálico</em>
    <br>

    <!-- ilink -->
    <a href="https://www.google.com" target="_blank">Ir para o Google</a> <!-- target="_blank" → abre em nova aba -->
    <br>

    <!-- Imagem -->
    <img src="../img/batata.jfif" alt="Descrição da imagem" width="200">
    <hr>
    <br>

    <!-- imagem com ilink -->
    <a href="https://www.google.com" target="_blank"><img src="../img/google.png" alt="Imagem do goole" width="200"></a>
    <!-- target="_blank" → abre em nova aba -->
    <br>

    <!-- Lista não ordenada -->
    <h3>Lista não ordenada</h3>
    <ul>
        <li>Item 01</li>
        <li>Item 02</li>
    </ul>

    <!-- Lista ordenada -->
    <h3>Lista ordenada</h3>
    <ol>
        <li>Item 01</li>
        <li>Item 02</li>
    </ol>

    <!-- Tabela -->
    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Idade</th>
        </tr>
        <tr>
            <td>Fernando</td>
            <td>25</td>
        </tr>
    </table>

    <!-- Formulário -->
    <form>
        <label>Nome:</label>
        <input type="text" placeholder="Nome">

        <label>Email:</label>
        <input type="email" placeholder="Email">

        <button type="submit">Enviar</button>
    </form>

</body>

</html>
